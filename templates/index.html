<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>La Vitrine - Brief LinkedIn</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
        h1 { color: #6c63ff; }
        input, textarea, select { width: 100%; padding: 10px; margin: 8px 0 16px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background: #6c63ff; color: white; padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; width: 100%; font-size: 16px; }
        .post { background: #f9f9f9; padding: 16px; margin: 12px 0; border-radius: 8px; border-left: 4px solid #6c63ff; }
    </style>
</head>
<body>
    <h1>🎯 La Vitrine</h1>
    <p>Remplissez ce formulaire pour générer vos 16 posts LinkedIn</p>

    <label>Nom / Prénom</label>
    <input type="text" id="nom" placeholder="Marie Dupont" />

    <label>Secteur d'activité</label>
    <input type="text" id="secteur" placeholder="Coaching, Consulting..." />

    <label>Offres / Services</label>
    <textarea id="offres" rows="3" placeholder="Décrivez vos offres..."></textarea>

    <label>Résultats / Promesse client</label>
    <textarea id="resultats" rows="3" placeholder="Ex: Je double votre CA en 6 mois..."></textarea>

    <label>Ton de communication</label>
    <select id="ton">
        <option>Inspirant / Motivant</option>
        <option>Expert / Autorité</option>
        <option>Storytelling / Personnel</option>
        <option>Humour / Décalé</option>
    </select>

    <button onclick="generer()">✨ Générer mes 16 posts</button>

    <div id="resultats-posts"></div>

    <script>
        async function generer() {
            const uuid = window.location.pathname.split('/').pop();
            const btn = document.querySelector('button');
            btn.textContent = '⏳ Génération en cours...';
            btn.disabled = true;

            const res = await fetch(`/api/generate/${uuid}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    nom: document.getElementById('nom').value,
                    secteur: document.getElementById('secteur').value,
                    offres: document.getElementById('offres').value,
                    resultats: document.getElementById('resultats').value,
                    ton: document.getElementById('ton').value
                })
            });

            const data = await res.json();
            btn.textContent = '✨ Générer mes 16 posts';
            btn.disabled = false;

            if (data.posts) {
                document.getElementById('resultats-posts').innerHTML =
                    data.posts.map(p => `
                        <div class="post">
                            <strong>Post ${p.post_id} — ${p.ton}</strong>
                            <p>${p.contenu}</p>
                            <small>🖼️ ${p.prompt_image}</small>
                        </div>
                    `).join('');
            }
        }
    </script>
</body>
</html>
